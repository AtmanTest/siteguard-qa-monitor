<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SiteGuard — Dashboard</title>
<style>
:root {
  --bg: #07070d; --card: #12121e; --border: #1e1e32;
  --text: #e8e8f0; --text-dim: #8888a8; --text-muted: #55557a;
  --accent: #7c6cf0; --green: #34d399; --red: #ff6b6b; --orange: #f59e0b;
  --radius: 12px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, sans-serif; min-height: 100vh; }
.nav { display: flex; justify-content: space-between; align-items: center; padding: 16px 24px; border-bottom: 1px solid var(--border); }
.nav a { color: var(--text-dim); text-decoration: none; font-size: 14px; }
.container { max-width: 1200px; margin: 0 auto; padding: 24px; }

.stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 32px; }
.stat-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; }
.stat-value { font-size: 32px; font-weight: 700; }
.stat-label { font-size: 12px; color: var(--text-muted); margin-top: 4px; }

.sites { display: flex; flex-direction: column; gap: 16px; }
.site-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; }
.site-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.site-name { font-weight: 600; font-size: 16px; }
.site-url { font-size: 13px; color: var(--text-dim); }
.status-badge { padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }
.status-ok { background: rgba(52,211,153,0.1); color: var(--green); }
.status-warning { background: rgba(245,158,11,0.1); color: var(--orange); }
.status-error { background: rgba(255,107,107,0.1); color: var(--red); }

.check-list { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
.check-dot { width: 10px; height: 10px; border-radius: 50%; }
.check-ok { background: var(--green); }
.check-warning { background: var(--orange); }
.check-error { background: var(--red); }

.add-form { display: flex; gap: 8px; margin-bottom: 24px; }
.add-form input { flex: 1; padding: 10px 14px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-family: inherit; font-size: 14px; }
.add-form button { padding: 10px 20px; border-radius: 8px; background: var(--accent); color: #fff; border: none; cursor: pointer; font-weight: 600; font-size: 14px; }

.refresh-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
.btn-sm { padding: 6px 14px; border-radius: 6px; background: var(--card); border: 1px solid var(--border); color: var(--text-dim); cursor: pointer; font-size: 12px; }
.btn-sm:hover { border-color: var(--accent); color: var(--text); }

.empty { text-align: center; padding: 60px; color: var(--text-muted); }
</style>
</head>
<body>
<div class="nav">
  <span style="font-weight:700;">🔍 SiteGuard</span>
  <a href="/">← Landing</a>
</div>
<div class="container">
  <div class="stats" id="stats"></div>

  <div class="refresh-bar">
    <h2>Sites surveillés</h2>
    <button class="btn-sm" onclick="runAll()">🔄 Check All Now</button>
  </div>

  <div class="add-form">
    <input type="text" id="new-url" placeholder="https://example.com">
    <input type="text" id="new-name" placeholder="Nom (optionnel)" style="max-width:200px;">
    <button onclick="addSite()">+ Ajouter</button>
  </div>

  <div class="sites" id="sites"></div>
  <div class="empty" id="empty">Aucun site. Ajoutez-en un ci-dessus.</div>
</div>

<script>
async function loadSites() {
  const r = await fetch('/api/sites');
  const sites = await r.json();
  const container = document.getElementById('sites');
  const stats = document.getElementById('stats');
  const empty = document.getElementById('empty');

  if (sites.length === 0) {
    container.innerHTML = '';
    empty.style.display = 'block';
    stats.innerHTML = '';
    return;
  }
  empty.style.display = 'none';

  let ok = 0, warn = 0, err = 0;
  sites.forEach(s => {
    if (s.status === 'ok') ok++;
    else if (s.status === 'warning') warn++;
    else err++;
  });

  stats.innerHTML = `
    <div class="stat-card"><div class="stat-value" style="color:var(--green)">${ok}</div><div class="stat-label">OK</div></div>
    <div class="stat-card"><div class="stat-value" style="color:var(--orange)">${warn}</div><div class="stat-label">Warnings</div></div>
    <div class="stat-card"><div class="stat-value" style="color:var(--red)">${err}</div><div class="stat-label">Erreurs</div></div>
    <div class="stat-card"><div class="stat-value">${sites.length}</div><div class="stat-label">Total sites</div></div>
  `;

  container.innerHTML = sites.map(s => {
    const sc = s.status === 'ok' ? 'ok' : s.status === 'warning' ? 'warning' : 'error';
    const lastCheck = s.last_check ? new Date(s.last_check).toLocaleString('fr') : 'Jamais';
    return `
      <div class="site-card">
        <div class="site-header">
          <div>
            <div class="site-name">${s.name || s.url}</div>
            <div class="site-url">${s.url}</div>
          </div>
          <span class="status-badge status-${sc}">${s.status.toUpperCase()}</span>
        </div>
        <div style="font-size:12px;color:var(--text-muted);">Dernier check: ${lastCheck} · Échecs consécutifs: ${s.consecutive_failures || 0}</div>
        <div style="margin-top:8px;">
          <button class="btn-sm" onclick="checkSite(${s.id})">🔄 Check</button>
          <button class="btn-sm" onclick="viewReport(${s.id})">📊 Rapport</button>
        </div>
      </div>`;
  }).join('');
}

async function addSite() {
  const url = document.getElementById('new-url').value.trim();
  const name = document.getElementById('new-name').value.trim();
  if (!url) return alert('URL requise');
  document.getElementById('new-url').disabled = true;
  try {
    await fetch('/api/check', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({url, name})
    });
    document.getElementById('new-url').value = '';
    document.getElementById('new-name').value = '';
    loadSites();
  } catch(e) { alert('Erreur: ' + e.message); }
  document.getElementById('new-url').disabled = false;
}

async function checkSite(id) {
  const r = await fetch(`/api/check/${id}`);
  const data = await r.json();
  alert(`Check terminé: ${data.status}\nTemps: ${data.response_time_ms}ms\nProblèmes: ${data.issues.length}`);
  loadSites();
}

async function runAll() {
  const r = await fetch('/api/run-all', {method:'POST'});
  const data = await r.json();
  alert(`${data.checked} sites vérifiés`);
  loadSites();
}

async function viewReport(id) {
  const r = await fetch(`/api/report/${id}`);
  const data = await r.json();
  alert(`Rapport: ${data.site.name || data.site.url}\nUptime: ${data.uptime}%\nChecks: ${data.summary.total}\nOK: ${data.summary.ok}\nWarnings: ${data.summary.warnings}\nErreurs: ${data.summary.errors}\nAvg response: ${data.summary.avg_response_ms}ms`);
}

loadSites();
setInterval(loadSites, 30000);
</script>
</body>
</html>
